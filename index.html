<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GYM TRACKER — Nacho</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07070f;
      --surface: #10101c;
      --surface2: #181826;
      --surface3: #22223a;
      --accent: #7c3aed;
      --accent-l: #a78bfa;
      --accent2: #ec4899;
      --text: #e4e4f0;
      --muted: #6666aa;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.07);
      --nav-h: 68px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding-bottom: var(--nav-h);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ─── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(16,16,28,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; cursor: pointer;
      color: var(--muted); font-size: 10px; font-weight: 600;
      background: none; border: none; transition: color .2s;
      padding-bottom: 4px;
      letter-spacing: .3px;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
    .nav-btn.active { color: var(--accent-l); }
    .nav-btn.active svg { filter: drop-shadow(0 0 6px var(--accent)); }

    /* ─── PAGES ─── */
    .page { display: none; padding: 16px; max-width: 560px; margin: 0 auto; padding-top: 20px; }
    .page.active { display: block; }

    /* ─── HEADER CARD ─── */
    .hero {
      background: linear-gradient(135deg, #1a0a3a 0%, #2d1058 50%, #1a0a3a 100%);
      border: 1px solid rgba(124,58,237,.3);
      border-radius: 20px; padding: 22px 20px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(167,139,250,.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-date { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .hero-title { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .hero-title span {
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }

    /* ─── STATS GRID ─── */
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; text-align: center;
    }
    .stat-val { font-size: 30px; font-weight: 800; color: var(--accent-l); line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 5px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }

    /* ─── CARD ─── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px; margin-bottom: 14px;
    }
    .card-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

    /* ─── TODAY WORKOUT ─── */
    .today-day {
      font-size: 18px; font-weight: 800; margin-bottom: 4px;
    }
    .today-muscle {
      display: inline-block; padding: 4px 12px;
      background: rgba(124,58,237,.2); border: 1px solid rgba(124,58,237,.4);
      border-radius: 20px; font-size: 12px; color: var(--accent-l);
      font-weight: 600; margin-bottom: 12px;
    }
    .exercise-preview {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .exercise-preview:last-child { border-bottom: none; }
    .ex-spec { color: var(--muted); font-size: 12px; }

    /* ─── BUTTONS ─── */
    .btn {
      padding: 13px 20px; border-radius: 14px; border: none;
      cursor: pointer; font-weight: 700; font-size: 15px;
      transition: all .2s; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
      color: white; width: 100%;
      box-shadow: 0 4px 20px rgba(124,58,237,.4);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,.5); }
    .btn-secondary { background: var(--surface3); color: var(--text); }
    .btn-ghost { background: transparent; color: var(--muted); padding: 8px 12px; font-size: 13px; }
    .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 10px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 10px; font-size: 18px; }
    .btn-full { width: 100%; }

    /* ─── FORM ─── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
    input, select, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px; padding: 11px 14px;
      font-size: 15px; font-family: inherit; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-l); }
    select option { background: var(--surface2); }
    textarea { resize: none; }

    /* ─── CHIPS ─── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 20px;
      background: var(--surface3); border: 1px solid var(--border);
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all .2s; color: var(--muted); white-space: nowrap;
    }
    .chip.on { background: rgba(124,58,237,.25); border-color: var(--accent); color: var(--accent-l); }

    /* ─── EXERCISE BLOCK ─── */
    .ex-block {
      background: var(--surface2); border-radius: 14px;
      padding: 14px; margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .ex-block-head {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 12px;
    }
    .ex-name { font-weight: 700; font-size: 15px; }
    .sets-grid {
      display: grid; grid-template-columns: 40px 1fr 1fr 36px;
      gap: 6px; align-items: center;
    }
    .set-label { font-size: 12px; color: var(--muted); font-weight: 600; text-align: center; }
    .set-num {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface3); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700; color: var(--muted);
      flex-shrink: 0;
    }
    .set-input {
      padding: 8px 10px; text-align: center; font-size: 15px; font-weight: 700;
    }
    .set-done {
      width: 36px; height: 36px; border-radius: 10px; border: none;
      cursor: pointer; font-size: 16px; transition: all .2s;
      background: var(--surface3); display: flex; align-items: center; justify-content: center;
    }
    .set-done.checked { background: rgba(34,197,94,.2); border: 1px solid rgba(34,197,94,.4); }
    .add-set-btn {
      margin-top: 10px; width: 100%; padding: 8px;
      background: transparent; border: 1px dashed var(--border);
      border-radius: 10px; color: var(--muted); cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all .2s;
    }
    .add-set-btn:hover { border-color: var(--accent); color: var(--accent-l); }

    /* ─── HISTORY ITEM ─── */
    .hist-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 10px;
      cursor: pointer; transition: border-color .2s;
    }
    .hist-item:hover { border-color: rgba(124,58,237,.4); }
    .hist-date { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .hist-muscles { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .hist-tag {
      padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
      background: rgba(124,58,237,.15); color: var(--accent-l);
    }
    .hist-exlist { font-size: 13px; color: var(--muted); }
    .hist-stats { display: flex; gap: 16px; margin-top: 10px; }
    .hist-stat { font-size: 12px; color: var(--muted); }
    .hist-stat span { color: var(--accent-l); font-weight: 700; }
    .hist-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .hist-detail.open { display: block; }

    /* ─── PROGRESS BAR ─── */
    .prog-wrap { margin-top: 8px; }
    .prog-bar {
      background: var(--surface3); border-radius: 8px; height: 8px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      transition: width .6s ease;
    }
    .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }

    /* ─── CHART CARD ─── */
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
    }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .chart-wrap { position: relative; height: 180px; }

    /* ─── ROUTINE ─── */
    .phase-header {
      background: linear-gradient(135deg, rgba(124,58,237,.2) 0%, rgba(236,72,153,.1) 100%);
      border: 1px solid rgba(124,58,237,.3);
      border-radius: 16px; padding: 16px; margin-bottom: 10px;
    }
    .phase-name { font-size: 16px; font-weight: 800; }
    .phase-weeks { font-size: 12px; color: var(--accent-l); margin-top: 2px; font-weight: 600; }
    .phase-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .rday {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 8px; overflow: hidden;
    }
    .rday-head {
      padding: 14px 16px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background .2s;
    }
    .rday-head:hover { background: var(--surface2); }
    .rday-left { display: flex; align-items: center; gap: 10px; }
    .rday-emoji { font-size: 20px; }
    .rday-name { font-weight: 700; font-size: 15px; }
    .rday-muscle { font-size: 12px; color: var(--accent-l); }
    .rday-arrow { color: var(--muted); transition: transform .2s; font-size: 12px; }
    .rday-body { display: none; padding: 0 16px 14px; }
    .rday-body.open { display: block; }
    .rday-note { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--warning); margin-bottom: 12px; }
    .rex {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .rex:last-child { border-bottom: none; }
    .rex-spec { font-size: 12px; color: var(--muted); }
    .rex.key .rex-name { color: var(--accent-l); font-weight: 700; }
    .rex.pause { color: var(--warning); font-size: 13px; font-style: italic; }

    /* ─── NUTRITION PAGE ─── */
    .nutr-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .nutr-table td { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .nutr-table td:last-child { text-align: right; font-weight: 700; color: var(--accent-l); }
    .meal-card { background: var(--surface2); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
    .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .meal-name { font-weight: 700; font-size: 15px; }
    .meal-kcal { font-size: 12px; color: var(--success); font-weight: 700; }
    .meal-items { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* ─── MISC ─── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
    }
    .badge-purple { background: rgba(124,58,237,.2); color: var(--accent-l); border: 1px solid rgba(124,58,237,.3); }
    .badge-green { background: rgba(34,197,94,.2); color: var(--success); border: 1px solid rgba(34,197,94,.3); }
    .badge-orange { background: rgba(245,158,11,.2); color: var(--warning); border: 1px solid rgba(245,158,11,.3); }
    .text-muted { color: var(--muted); font-size: 14px; }
    .mt8 { margin-top: 8px; }
    .mt14 { margin-top: 14px; }
    .mb10 { margin-bottom: 10px; }
    h2 { font-size: 20px; font-weight: 800; margin-bottom: 16px; }
    h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: var(--success); color: #fff; padding: 12px 24px;
      border-radius: 14px; font-weight: 700; z-index: 999;
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
      white-space: nowrap; font-size: 14px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }

    /* ─── MODAL ─── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 200; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 24px 24px 0 0;
      padding: 24px; width: 100%; max-height: 75vh; overflow-y: auto;
      max-width: 560px; margin: 0 auto;
    }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
    .ex-search-input { margin-bottom: 10px; }
    .ex-list { max-height: 260px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; }
    .ex-opt {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      font-size: 14px; transition: background .15s; display: flex; align-items: center; justify-content: space-between;
    }
    .ex-opt:last-child { border-bottom: none; }
    .ex-opt:hover { background: var(--surface3); }
    .ex-opt-group { font-size: 11px; color: var(--muted); font-weight: 600; }

    /* ─── EMPTY STATE ─── */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; opacity: .7; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    /* ─── STREAK FLAME ─── */
    .streak-big { text-align: center; padding: 10px 0; }
    .streak-num { font-size: 56px; font-weight: 900; color: var(--accent-l); line-height: 1; }
    .streak-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ─── MOTIVATION ─── */
    .quote-card {
      background: linear-gradient(135deg, #0f0f2a 0%, #1a0a3a 100%);
      border: 1px solid rgba(124,58,237,.2);
      border-radius: 16px; padding: 18px; margin-bottom: 14px;
      text-align: center;
    }
    .quote-text {
      font-size: 15px; font-weight: 700; line-height: 1.5;
      background: linear-gradient(135deg, #c4b5fd 0%, #f9a8d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    @media (min-width: 580px) {
      body { padding-bottom: 0; padding-left: 72px; }
      .nav {
        flex-direction: column; width: 72px; height: 100vh;
        top: 0; bottom: auto; border-top: none; border-right: 1px solid var(--border);
      }
      .nav-btn { padding: 18px 0; font-size: 9px; gap: 5px; }
    }
  </style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: Auth Login/Signup -->
<div class="overlay" id="auth-modal" style="display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.9)">
  <div class="modal" style="max-width:380px;width:90%">
    <div class="modal-title" style="margin-bottom:20px">🔐 GYM TRACKER</div>

    <div id="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="auth-password" placeholder="Contraseña" autocomplete="password">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="authLogin()">Ingresar</button>
      <button class="btn" style="width:100%;background:var(--surface2);color:var(--text)" onclick="authSignup()">Crear cuenta</button>
      <div style="font-size:12px;color:var(--muted);margin-top:12px;text-align:center">
        Tu datos se sincronizarán en todos tus dispositivos 🔄
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Agregar ejercicio -->
<div class="overlay" id="ex-modal" onclick="closeExModal(event)">
  <div class="modal">
    <div class="modal-title">Agregar ejercicio</div>
    <input type="text" class="ex-search-input" id="ex-search" placeholder="Buscar ejercicio..." oninput="filterExList()" autocomplete="off">
    <div class="ex-list" id="ex-list"></div>
  </div>
</div>

<!-- MODAL: Detalle workout historial -->
<div class="overlay" id="detail-modal" onclick="closeDetailModal(event)">
  <div class="modal" id="detail-content"></div>
</div>

<!-- PAGES -->
<div class="page active" id="page-dash"></div>
<div class="page" id="page-log"></div>
<div class="page" id="page-hist"></div>
<div class="page" id="page-anal"></div>
<div class="page" id="page-prog"></div>
<div class="page" id="page-weight"></div>
<div class="page" id="page-diet"></div>

<!-- DEBUG -->
<script>
  console.log('✅ index.html loaded');
  console.log('Loading app.js...');
</script>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="navigate('dash')" id="nav-dash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3L21 12M5 10V19A1 1 0 006 20H9V15H15V20H18A1 1 0 0019 19V10"/></svg>
    Inicio
  </button>
  <button class="nav-btn" onclick="navigate('log')" id="nav-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/><path d="M12 8v4l3 3"/></svg>
    Registrar
  </button>
  <button class="nav-btn" onclick="navigate('hist')" id="nav-hist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 12h6M9 16h4"/></svg>
    Historial
  </button>
  <button class="nav-btn" onclick="navigate('anal')" id="nav-anal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Análisis
  </button>
  <button class="nav-btn" onclick="navigate('prog')" id="nav-prog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Programa
  </button>
  <button class="nav-btn" onclick="navigate('weight')" id="nav-weight">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="5" r="3"/><path d="M6 8h12M8 8v8a4 4 0 008 0V8M8 16h8"/></svg>
    Peso
  </button>
  <button class="nav-btn" onclick="navigate('diet')" id="nav-diet">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6M12 3v18M3 12h18M9 9h6v6H9z"/></svg>
    Dieta
  </button>
</nav>

<script src="app.js"></script>
</body>
</html>
